<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#87b9c7" />
    <title>Mirror 泡泡</title>
    <link rel="stylesheet" href="./mirror.css?v=0.2.1" />
  </head>
  <body>
    <main class="mirror-shell" aria-label="Mirror 泡泡生成实验">
      <canvas id="mirrorCanvas" aria-label="Mirror 泡泡画面"></canvas>

      <section class="mirror-hud" aria-label="Mirror 控制">
        <div class="readout">
          <span>Mirror</span>
          <strong id="modeLabel">EDGE</strong>
        </div>
        <div class="readout compact">
          <span>体积</span>
          <strong id="volumeLabel">1.00</strong>
        </div>
        <div class="tool-row" role="group" aria-label="生成位置">
          <button type="button" data-mode="corner" title="角落">◰</button>
          <button type="button" data-mode="edge" title="边缘" class="active">┃</button>
          <button type="button" data-mode="range" title="范围">▤</button>
        </div>
        <label class="volume-control">
          <input id="volumeScale" type="range" min="0.70" max="1.80" value="1.00" step="0.05" aria-label="体积倍率" />
        </label>
      </section>

      <button id="burstButton" class="burst-button" type="button" aria-label="生成一串泡泡">生成</button>
      <div id="stats" class="mirror-stats" aria-hidden="true">--</div>
    </main>

    <script src="./mirror.js?v=0.2.1" defer></script>
  </body>
</html>
