<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6eafc0" />
    <title>泡泡组合编辑器</title>
    <link rel="stylesheet" href="./editor.css?v=1.1.0" />
  </head>
  <body>
    <main class="editor-shell">
      <aside class="panel pack-panel">
        <header>
          <h1>泡泡组合</h1>
          <a class="game-link" href="./index.html?dev=1">打开游戏</a>
        </header>

        <label>
          名称
          <input id="packName" type="text" maxlength="40" />
        </label>
        <label>
          说明
          <textarea id="packDescription" rows="3" maxlength="160"></textarea>
        </label>

        <div class="field-grid">
          <label>
            最低等级
            <input id="spawnMinLevel" type="number" min="1" max="99" step="1" />
          </label>
          <label>
            使用概率
            <input id="spawnChance" type="number" min="0" max="1" step="0.05" />
          </label>
          <label>
            间隔下限 ms
            <input id="intervalMin" type="number" min="160" max="2400" step="20" />
          </label>
          <label>
            间隔上限 ms
            <input id="intervalMax" type="number" min="160" max="2400" step="20" />
          </label>
          <label>
            屏内上限
            <input id="maxActive" type="number" min="1" max="12" step="1" />
          </label>
        </div>

        <div class="button-row">
          <button id="savePack" type="button">保存到游戏</button>
          <button id="exportPack" type="button">导出 JSON</button>
        </div>
        <div class="button-row">
          <button id="importPack" type="button">导入 JSON</button>
          <button id="resetPack" type="button">示例组合</button>
        </div>
        <input id="importFile" type="file" accept="application/json,.json" hidden />
        <p id="statusLine" class="status-line">READY</p>
        <textarea id="jsonOutput" class="json-output" spellcheck="false"></textarea>
      </aside>

      <section class="preview-panel">
        <div class="preview-top">
          <strong id="previewName">Preview</strong>
          <span id="previewMeta">0 templates</span>
        </div>
        <div class="draw-toolbar" aria-label="轨迹绘制工具">
          <button class="tool-button active" data-mode="preview" type="button">预览</button>
          <button class="tool-button" data-mode="points" type="button">点路径</button>
          <button class="tool-button" data-mode="draw" type="button">手绘</button>
          <button id="undoPathPoint" type="button">撤销点</button>
          <button id="clearPath" type="button">清空线</button>
        </div>
        <p id="drawHint" class="draw-hint">点路径：点击添加节点，拖动已有节点微调。手绘：按住拖出轨迹。</p>
        <canvas id="previewCanvas" width="390" height="844"></canvas>
      </section>

      <aside class="panel template-panel">
        <header>
          <h2>模板</h2>
          <div class="mini-actions">
            <button id="addTemplate" type="button">新增</button>
            <button id="duplicateTemplate" type="button">复制</button>
            <button id="deleteTemplate" type="button">删除</button>
          </div>
        </header>
        <div id="templateList" class="template-list"></div>

        <section class="quick-controls">
          <h3>常用拉杆</h3>
          <label class="slider-row">
            <span>大小</span>
            <input data-slider="size" type="range" min="14" max="86" step="1" />
            <output data-slider-value="size"></output>
          </label>
          <label class="slider-row">
            <span>速度</span>
            <input data-slider="speed" type="range" min="8" max="260" step="1" />
            <output data-slider-value="speed"></output>
          </label>
          <label class="slider-row">
            <span>数量</span>
            <input data-slider="count" type="range" min="1" max="12" step="1" />
            <output data-slider-value="count"></output>
          </label>
          <label class="slider-row">
            <span>点几次</span>
            <input data-slider="tapCount" type="range" min="0" max="9" step="1" />
            <output data-slider-value="tapCount"></output>
          </label>
          <label class="slider-row">
            <span>间距</span>
            <input data-slider="spacing" type="range" min="0" max="80" step="1" />
            <output data-slider-value="spacing"></output>
          </label>
          <label class="slider-row">
            <span>摆幅</span>
            <input data-slider="amplitude" type="range" min="0" max="64" step="1" />
            <output data-slider-value="amplitude"></output>
          </label>
          <label class="slider-row">
            <span>弯曲</span>
            <input data-slider="pathCurve" type="range" min="0" max="100" step="1" />
            <output data-slider-value="pathCurve"></output>
          </label>
          <label class="slider-row">
            <span>权重</span>
            <input data-slider="weight" type="range" min="0.05" max="5" step="0.05" />
            <output data-slider-value="weight"></output>
          </label>
        </section>

        <form id="templateForm" class="template-form">
          <label>
            名称
            <input data-template="label" type="text" maxlength="28" />
          </label>

          <div class="field-grid">
            <label>
              权重
              <input data-template="weight" type="number" min="0.05" max="20" step="0.05" />
            </label>
            <label>
              最低 Lv
              <input data-template="levelMin" type="number" min="1" max="99" step="1" />
            </label>
            <label>
              最高 Lv
              <input data-template="levelMax" type="number" min="1" max="99" step="1" />
            </label>
            <label>
              点几次
              <input data-template="tapCount" type="number" min="0" max="9" step="1" />
            </label>
            <label>
              颜色
              <select data-template="colorMode">
                <option value="auto">自动交替</option>
                <option value="random">随机</option>
                <option value="background">出生背景</option>
                <option value="left">蓝色</option>
                <option value="right">粉色</option>
              </select>
            </label>
            <label>
              边缘
              <select data-template="edge">
                <option value="random">随机</option>
                <option value="left">左</option>
                <option value="right">右</option>
                <option value="top">上</option>
                <option value="bottom">下</option>
              </select>
            </label>
            <label>
              轨迹
              <select data-template="trajectory">
                <option value="straight">直线</option>
                <option value="softS">柔 S</option>
                <option value="arc">弧线</option>
                <option value="zigzag">轻折线</option>
                <option value="spray">喷射</option>
                <option value="fan">扇形</option>
                <option value="sGroup">S 组</option>
                <option value="arcDuo">双弧</option>
              </select>
            </label>
          </div>

          <h3>范围</h3>
          <div class="field-grid">
            <label>
              数量 min
              <input data-template="count.0" type="number" min="1" max="12" step="1" />
            </label>
            <label>
              数量 max
              <input data-template="count.1" type="number" min="1" max="12" step="1" />
            </label>
            <label>
              间距 min
              <input data-template="spacing.0" type="number" min="0" max="80" step="1" />
            </label>
            <label>
              间距 max
              <input data-template="spacing.1" type="number" min="0" max="80" step="1" />
            </label>
            <label>
              半径 min
              <input data-template="size.0" type="number" min="14" max="86" step="1" />
            </label>
            <label>
              半径 max
              <input data-template="size.1" type="number" min="14" max="86" step="1" />
            </label>
            <label>
              速度 min
              <input data-template="speed.0" type="number" min="8" max="260" step="1" />
            </label>
            <label>
              速度 max
              <input data-template="speed.1" type="number" min="8" max="260" step="1" />
            </label>
          </div>

          <h3>单个泡泡大小</h3>
          <div id="bubbleSizeList" class="bubble-size-list"></div>

          <h3>屏幕区域</h3>
          <div class="field-grid">
            <label>
              轨道 min
              <input data-template="lane.0" type="number" min="0.08" max="0.92" step="0.01" />
            </label>
            <label>
              轨道 max
              <input data-template="lane.1" type="number" min="0.08" max="0.92" step="0.01" />
            </label>
            <label>
              目标 X min
              <input data-template="aimX.0" type="number" min="0.05" max="0.95" step="0.01" />
            </label>
            <label>
              目标 X max
              <input data-template="aimX.1" type="number" min="0.05" max="0.95" step="0.01" />
            </label>
            <label>
              目标 Y min
              <input data-template="aimY.0" type="number" min="0.05" max="0.95" step="0.01" />
            </label>
            <label>
              目标 Y max
              <input data-template="aimY.1" type="number" min="0.05" max="0.95" step="0.01" />
            </label>
          </div>

          <h3>轨迹参数</h3>
          <div class="field-grid">
            <label>
              摆幅 min
              <input data-template="amplitude.0" type="number" min="0" max="64" step="1" />
            </label>
            <label>
              摆幅 max
              <input data-template="amplitude.1" type="number" min="0" max="64" step="1" />
            </label>
            <label>
              频率 min
              <input data-template="frequency.0" type="number" min="0.4" max="8" step="0.1" />
            </label>
            <label>
              频率 max
              <input data-template="frequency.1" type="number" min="0.4" max="8" step="0.1" />
            </label>
            <label>
              弧度 min
              <input data-template="arcBend.0" type="number" min="-110" max="110" step="1" />
            </label>
            <label>
              弧度 max
              <input data-template="arcBend.1" type="number" min="-110" max="110" step="1" />
            </label>
            <label>
              弧长 min
              <input data-template="arcLife.0" type="number" min="0.5" max="8" step="0.1" />
            </label>
            <label>
              弧长 max
              <input data-template="arcLife.1" type="number" min="0.5" max="8" step="0.1" />
            </label>
          </div>
        </form>
      </aside>
    </main>
    <script src="./editor.js?v=1.1.0" defer></script>
  </body>
</html>
